<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doraemon Fansub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0d0e12] text-white">

    <!-- Header -->
    <header class="sticky top-0 z-50 flex items-center justify-between px-6 py-3 bg-[#16181f] border-b border-gray-800">
        <h1 class="text-xl font-bold text-blue-500">doraemon<span class="text-white">fansub</span></h1>
        <div id="user-header-zone">
            <button id="btn-open-auth-modal" class="bg-blue-600 px-4 py-2 rounded-lg text-sm">Đăng nhập</button>
            <div id="user-logged-in" class="hidden flex items-center gap-3">
                <img id="user-avatar" class="w-8 h-8 rounded-full">
                <span id="user-display-name"></span>
                <button id="btn-logout" class="text-red-400">Đăng xuất</button>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-4xl mx-auto p-6">
        <div id="newsfeed-container" class="space-y-6"></div>
    </main>

    <!-- Modal Đăng nhập -->
    <div id="auth-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden">
        <div class="bg-[#16181f] p-6 rounded-2xl w-80">
            <input type="text" id="auth-username" placeholder="Tên hiển thị" class="w-full mb-3 bg-[#20232b] p-2 rounded hidden">
            <input type="email" id="auth-email" placeholder="Email" class="w-full mb-3 bg-[#20232b] p-2 rounded">
            <input type="password" id="auth-password" placeholder="Mật khẩu" class="w-full mb-3 bg-[#20232b] p-2 rounded">
            <button id="btnAuthSubmit" class="w-full bg-blue-600 p-2 rounded">Đăng Nhập</button>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/newsfeed.js"></script>
</body>
</html>
