<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doraemon Fansub</title>
    <script src="https://www.google.com/recaptcha/enterprise.js?render=6Lf1TkQtAAAAAImKbJKjoNXX0Sbu-9ZJUoRbXJPR"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0d0e12] text-white">

    <!-- Header -->
    <header class="sticky top-0 z-50 flex items-center justify-between px-6 py-3 bg-[#16181f] border-b border-gray-800">
        <div class="flex items-center gap-6">
            <h1 class="text-xl font-bold text-blue-500">doraemon<span class="text-white">fansub</span></h1>
            <nav class="flex gap-4 text-sm text-gray-400">
                <a href="index.html" class="text-white">Trang chủ</a>
                <a href="watch.html">Xem phim</a>
            </nav>
        </div>
        <div id="user-header-zone">
            <button id="btn-open-auth-modal" class="bg-blue-600 px-4 py-2 rounded-lg text-sm">Đăng nhập</button>
            <div id="user-logged-in" class="hidden flex items-center gap-3">
                <img id="user-avatar" class="w-8 h-8 rounded-full">
                <span id="user-display-name"></span>
                <button id="btn-logout" class="text-red-400 text-sm">Đăng xuất</button>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-4xl mx-auto p-6">
        <div id="post-modal" class="bg-[#16181f] p-4 rounded-2xl mb-6 border border-gray-800">
            <textarea id="post-content" placeholder="Bồ đang nghĩ gì thế?" class="w-full bg-[#20232b] text-white p-3 rounded-lg mb-2"></textarea>
            <div class="flex justify-between items-center">
                <input type="file" id="post-file" class="text-xs text-gray-400">
                <button id="btn-submit-post" class="bg-blue-600 px-4 py-2 rounded-lg text-sm font-bold">Đăng bài</button>
            </div>
        </div>
        <div id="newsfeed-container" class="space-y-6"></div>
    </main>

    <!-- Modal Auth -->
    <div id="auth-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden z-[100]">
        <div class="bg-[#16181f] p-6 rounded-2xl w-80">
            <input type="text" id="auth-username" placeholder="Tên hiển thị" class="w-full mb-3 bg-[#20232b] p-2 rounded hidden">
            <input type="email" id="auth-email" placeholder="Email" class="w-full mb-3 bg-[#20232b] p-2 rounded">
            <input type="password" id="auth-password" placeholder="Mật khẩu" class="w-full mb-3 bg-[#20232b] p-2 rounded">
            <div id="recaptcha-container" class="mb-3"></div>
            <button id="btnAuthSubmit" class="w-full bg-blue-600 p-2 rounded">Đăng Nhập</button>
            <button id="btn-toggle-auth" class="text-xs text-gray-400 mt-3 w-full text-center hover:text-white transition">Chưa có tài khoản? Đăng ký ngay</button>
        </div>
    </div>

    <!-- Modal xem ảnh full -->
    <div id="image-modal" class="fixed inset-0 bg-black/90 hidden z-[200] flex items-center justify-center p-4">
        <img id="full-image" src="" class="max-w-full max-h-full object-contain cursor-pointer">
    </div>

    <!-- Scripts -->
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/newsfeed.js"></script>
    <script>
        document.addEventListener('click', (e) => {
            if(e.target.tagName === 'IMG' && e.target.classList.contains('post-image')) {
                document.getElementById('full-image').src = e.target.src;
                document.getElementById('image-modal').classList.remove('hidden');
            }
        });
        document.getElementById('image-modal').onclick = () => document.getElementById('image-modal').classList.add('hidden');
    </script>
</body>
</html>
