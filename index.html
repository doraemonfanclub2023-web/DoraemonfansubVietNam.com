    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBt3G9n5JYu3EsvqJR9IoW2vRAc_Es3-ws",
            authDomain: "doraemon-fansub-vietnam.firebaseapp.com",
            projectId: "doraemon-fansub-vietnam",
            storageBucket: "doraemon-fansub-vietnam.firebasestorage.app",
            messagingSenderId: "380840935390",
            appId: "1:380840935390:web:60fab4722a9fba5053a74f",
            measurementId: "G-0S2Z4XRK0B"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const analytics = getAnalytics(app);

        // DOM
        const authStatus = document.getElementById('authStatus');
        const userAvatar = document.getElementById('userAvatar');
        const userName = document.getElementById('userName');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const createPostBox = document.getElementById('createPostBox');
        const postInput = document.getElementById('postInput');

        // ===== AUTH STATE =====
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Đã đăng nhập
                authStatus.style.display = 'flex';
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
                userAvatar.src = user.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.displayName || user.email);
                userName.textContent = user.displayName || user.email;
                createPostBox.style.opacity = '1';
                createPostBox.style.pointerEvents = 'auto';
                postInput.placeholder = `${user.displayName || 'Bạn'} đang nghĩ gì thế?`;
                console.log('✅ Đã đăng nhập:', user.email);
            } else {
                // Chưa đăng nhập
                authStatus.style.display = 'none';
                loginBtn.style.display = 'block';
                logoutBtn.style.display = 'none';
                createPostBox.style.opacity = '0.5';
                createPostBox.style.pointerEvents = 'none';
                postInput.placeholder = '🔑 Vui lòng đăng nhập để viết bài';
                console.log('👤 Chưa đăng nhập');
            }
        });

        // ===== LOGOUT =====
        window.logoutUser = async function() {
            try {
                await signOut(auth);
                console.log('✅ Đã đăng xuất');
                window.location.reload();
            } catch (error) {
                console.error('❌ Lỗi đăng xuất:', error);
                alert('Đăng xuất thất bại! Vui lòng thử lại.');
            }
        };
    </script>

<script>
    // ===== CLOUDINARY CONFIG =====
    const CLOUDINARY_CONFIG = {
        cloudName: 'gntkeeno',
        uploadPreset: 'doraemon_fansub_vn',
        folder: 'doraemon_fansub_vn'
    };

    let uploadedImageUrl = '';

    // ===== OPEN UPLOAD WIDGET =====
    function openUploadWidget() {
        const isLoggedIn = document.getElementById('authStatus').style.display === 'flex';
        if (!isLoggedIn) {
            alert('🔑 Vui lòng đăng nhập để đăng ảnh!');
            window.location.href = 'login.html';
            return;
        }

        const widget = cloudinary.createUploadWidget(
            {
                cloudName: CLOUDINARY_CONFIG.cloudName,
                uploadPreset: CLOUDINARY_CONFIG.uploadPreset,
                folder: CLOUDINARY_CONFIG.folder,
                sources: ['local', 'url', 'camera', 'google_drive'],
                multiple: false,
                maxFileSize: 10000000,
                resourceType: 'auto',
                clientAllowedFormats: ['image/*', 'video/*'],
                cropping: true,
                croppingAspectRatio: 1.91,
                styles: {
                    palette: {
                        window: '#FFFFFF',
                        sourceBg: '#f0f2f5',
                        windowBorder: '#e4e6eb',
                        tabIcon: '#1a73e8',
                        inactiveTabIcon: '#65676b',
                        menuIcons: '#1a73e8',
                        link: '#1a73e8',
                        action: '#1a73e8',
                        inProgress: '#1a73e8',
                        complete: '#34a853',
                        error: '#e94560',
                        textDark: '#1a1a2e',
                        textLight: '#65676b'
                    }
                }
            },
            (error, result) => {
                if (error) {
                    console.error('❌ Lỗi upload:', error);
                    alert('Upload thất bại! Vui lòng thử lại.');
                    document.getElementById('uploadProgress').style.display = 'none';
                    return;
                }

                if (result.event === 'success') {
                    uploadedImageUrl = result.info.secure_url;
                    const preview = document.getElementById('uploadPreview');
                    const previewImg = document.getElementById('previewImage');
                    previewImg.src = uploadedImageUrl;
                    preview.style.display = 'block';
                    document.getElementById('uploadStatus').textContent = '✅ Đã tải lên Cloudinary thành công!';
                    document.getElementById('progressFill').style.width = '100%';
                    setTimeout(() => {
                        document.getElementById('uploadProgress').style.display = 'none';
                        document.getElementById('progressFill').style.width = '0%';
                    }, 2000);
                }

                if (result.event === 'progress') {
                    document.getElementById('uploadProgress').style.display = 'block';
                    const progress = Math.round((result.info.bytesUploaded / result.info.totalBytes) * 100);
                    document.getElementById('progressFill').style.width = progress + '%';
                    document.getElementById('uploadStatus').textContent = `📤 Đang tải lên Cloudinary... ${progress}%`;
                }

                if (result.event === 'close') {
                    document.getElementById('uploadProgress').style.display = 'none';
                }
            }
        );
        widget.open();
    }

    function removeUploadedImage() {
        uploadedImageUrl = '';
        document.getElementById('uploadPreview').style.display = 'none';
        document.getElementById('previewImage').src = '';
    }

    // ===== POST DATA =====
    const postsData = [];
    let postIdCounter = 1;

    function renderPosts() {
        const container = document.getElementById('postList');
        if (postsData.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="icon">📝</div>
                    <h3>Chưa có bài viết nào</h3>
                    <p>Hãy là người đầu tiên chia sẻ điều gì đó!</p>
                </div>
            `;
            return;
        }
        container.innerHTML = '';
        postsData.forEach(post => {
            const card = document.createElement('div');
            card.className = 'post-card';
            const commentsHtml = post.comments.map(c => `
                <div class="comment-item">
                    <div class="avatar ${c.color}">${c.avatar}</div>
                    <div class="comment-body">
                        <div class="name">${c.user}</div>
                        <div class="text">${c.text}</div>
                        <div class="time">${c.time}</div>
                    </div>
                </div>
            `).join('');
            card.innerHTML = `
                <div class="post-header">
                    <div class="avatar ${post.color}">${post.avatar}</div>
                    <div class="info">
                        <div class="name">${post.user} <span class="badge">●</span></div>
                        <div class="time">${post.time}</div>
                    </div>
                    <button class="more-btn" onclick="showPostOptions(${post.id})">⋯</button>
                </div>
                <div class="post-content">${post.content}</div>
                ${post.image ? `<img src="${post.image}" alt="Post image" class="post-image">` : ''}
                <div class="post-stats">
                    <span class="likes"><span class="heart">❤️</span> ${post.likes}</span>
                    <span class="comments-count" onclick="toggleComments(${post.id})">${post.comments.length} bình luận</span>
                </div>
                <div class="post-footer">
                    <button onclick="toggleLike(${post.id})" class="${post.liked ? 'liked' : ''}">${post.liked ? '❤️' : '🤍'} Thích</button>
                    <button onclick="toggleComments(${post.id})">💬 Bình luận</button>
                    <button onclick="sharePost(${post.id})">📤 Chia sẻ</button>
                </div>
                <div class="comments-section ${post.showComments ? 'open' : ''}" id="comments-${post.id}">
                    ${commentsHtml}
                    <div class="comment-input">
                        <input type="text" id="commentInput-${post.id}" placeholder="Viết bình luận...">
                        <button onclick="addComment(${post.id})">Gửi</button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function createPost() {
        const isLoggedIn = document.getElementById('authStatus').style.display === 'flex';
        if (!isLoggedIn) {
            alert('🔑 Vui lòng đăng nhập để đăng bài!');
            window.location.href = 'login.html';
            return;
        }
        const input = document.getElementById('postInput');
        const content = input.value.trim();
        if (!content && !uploadedImageUrl) {
            alert('📝 Vui lòng nhập nội dung hoặc chọn ảnh/video!');
            return;
        }
        const newPost = {
            id: postIdCounter++,
            user: 'Doraemon Fansub VN',
            avatar: 'D',
            color: 'color-1',
            content: content || '📸 Chia sẻ hình ảnh',
            image: uploadedImageUrl || '',
            time: 'Vừa xong',
            likes: 0,
            liked: false,
            comments: [],
            showComments: false
        };
        postsData.unshift(newPost);
        renderPosts();
        input.value = '';
        uploadedImageUrl = '';
        document.getElementById('uploadPreview').style.display = 'none';
        document.getElementById('previewImage').src = '';
        const btn = document.querySelector('.post-btn');
        btn.textContent = '✅ Đã đăng!';
        setTimeout(() => btn.textContent = 'Đăng', 1500);
    }

    function toggleLike(postId) {
        const post = postsData.find(p => p.id === postId);
        if (post) {
            post.liked = !post.liked;
            post.likes += post.liked ? 1 : -1;
            renderPosts();
        }
    }

    function toggleComments(postId) {
        const post = postsData.find(p => p.id === postId);
        if (post) {
            post.showComments = !post.showComments;
            renderPosts();
            setTimeout(() => {
                const input = document.getElementById(`commentInput-${postId}`);
                if (input && post.showComments) input.focus();
            }, 100);
        }
    }

    function addComment(postId) {
        const input = document.getElementById(`commentInput-${postId}`);
        const text = input.value.trim();
        if (!text) return;
        const post = postsData.find(p => p.id === postId);
        if (post) {
            post.comments.push({
                user: 'Doraemon Fansub VN',
                avatar: 'D',
                color: 'color-1',
                text: text,
                time: 'Vừa xong'
            });
            post.showComments = true;
            input.value = '';
            renderPosts();
        }
    }

    function sharePost(postId) {
        const post = postsData.find(p => p.id === postId);
        if (post) {
            if (navigator.share) {
                navigator.share({ title: post.user, text: post.content }).catch(() => {});
            } else {
                navigator.clipboard.writeText(`${post.user}: ${post.content}`)
                    .then(() => alert('📤 Đã sao chép nội dung!'))
                    .catch(() => alert('📤 Chia sẻ: ' + post.content));
            }
        }
    }

    function showPostOptions(postId) {
        const options = ['📝 Sửa', '🗑️ Xóa', '🔕 Ẩn'];
        const choice = prompt('Chọn hành động:\n' + options.map((o, i) => `${i+1}. ${o}`).join('\n'));
        if (choice === '2' || choice === '🗑️ Xóa') {
            if (confirm('Bạn có chắc muốn xóa bài viết này?')) {
                const index = postsData.findIndex(p => p.id === postId);
                if (index !== -1) {
                    postsData.splice(index, 1);
                    renderPosts();
                }
            }
        } else if (choice === '3' || choice === '🔕 Ẩn') {
            alert('🔕 Đã ẩn bài viết');
        } else if (choice === '1' || choice === '📝 Sửa') {
            const post = postsData.find(p => p.id === postId);
            if (post) {
                const newContent = prompt('Sửa nội dung:', post.content);
                if (newContent !== null && newContent.trim()) {
                    post.content = newContent.trim();
                    renderPosts();
                }
            }
        }
    }

    function switchTab(btn, tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (tab === 'following') {
            const container = document.getElementById('postList');
            container.innerHTML = `
                <div class="empty-state">
                    <div class="icon">👤</div>
                    <h3>Bạn chưa theo dõi ai</h3>
                    <p>Khám phá những người dùng thú vị và theo dõi họ!</p>
                </div>
            `;
        } else {
            renderPosts();
        }
    }

    document.getElementById('postInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            createPost();
        }
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.target.id && e.target.id.startsWith('commentInput-')) {
            const postId = parseInt(e.target.id.split('-')[1]);
            addComment(postId);
        }
    });

    renderPosts();
    console.log('🎬 Doraemon Fansub Việt Nam đã sẵn sàng!');
</script>
</body>
</html>
