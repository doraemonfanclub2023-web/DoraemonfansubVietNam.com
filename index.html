<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doraemon Fansub - Mạng Xã Hội Hoạt Hình</title>
    <!-- Nhúng Tailwind CSS để làm giao diện nhanh -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Nhúng FontAwesome để xài các icon (Home, Watch, Kính lúp...) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d0e12; color: #ffffff; }
    </style>
</head>
<body>

    <!-- 1. THANH HEADER TRÊN CÙNG -->
<!-- Tìm đoạn này trong index.html -->
<a href="watch.html" class="hover:text-white px-3 py-1.5 flex items-center gap-2 text-sm transition">
    <i class="fa-solid fa-film"></i> Xem phim
</a>
    <header class="sticky top-0 z-50 flex items-center justify-between px-6 py-3 bg-[#16181f] border-b border-gray-800">
        <!-- Bên trái: Logo -->
        <div class="flex items-center space-x-6">
            <!-- ĐÃ SỬA: Đổi tên thương hiệu logo thành doraemonfansub chuẩn chỉnh -->
            <h1 class="text-xl font-bold text-blue-500 tracking-wider flex items-center">
                <i class="fa-solid fa-cat mr-2 text-blue-400"></i> doraemon<span class="text-white">fansub</span>
            </h1>
            <!-- Menu nhanh -->
            <nav class="flex space-x-4 text-gray-400">
                <a href="index.html" class="text-white bg-gray-800 px-3 py-1.5 rounded-lg flex items-center gap-2 text-sm">
                    <i class="fa-solid fa-house"></i> Trang chủ
                </a>
                <a href="watch.html" class="hover:text-white px-3 py-1.5 flex items-center gap-2 text-sm transition">
                    <i class="fa-solid fa-film"></i> Xem phim
                </a>
            </nav>
        </div>

        <!-- Ở giữa: Thanh tìm kiếm -->
        <div class="relative w-1/3">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>
            <input type="text" placeholder="Tìm kiếm bài viết, phim..." class="w-full bg-[#20232b] text-sm text-white pl-10 pr-4 py-2 rounded-lg focus:outline-none focus:ring-1 focus:ring-gray-600">
        </div>

       <!-- Khu vực bên phải Header -->
<div class="flex items-center space-x-4">
    <!-- Nút thông báo -->
    <button class="text-gray-400 hover:text-white p-2">
        <i class="fa-solid fa-bell"></i>
    </button>
    
    <!-- Cụm hiển thị khi đã đăng nhập -->
    <div id="user-logged-in" class="flex items-center space-x-2 bg-[#20232b] px-3 py-1.5 rounded-full border border-gray-700">
        <img id="user-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=admin" alt="Avatar" class="w-6 h-6 rounded-full">
        <span id="user-display-name" class="text-xs font-medium text-white truncate max-w-[80px]">admin</span>
        <button id="btn-logout" class="text-gray-400 hover:text-red-400 ml-1">
            <i class="fa-solid fa-right-from-bracket text-sm"></i>
        </button>
    </div>
</div>
            <!-- Khu vực hiển thị Đăng nhập / Avatar tùy theo trạng thái -->
            <div id="user-header-zone" class="flex items-center space-x-3">
                <!-- Mặc định khi chưa đăng nhập sẽ hiện nút này -->
                <button id="btn-open-auth-modal" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold py-2 px-4 rounded-lg transition">
                    Đăng nhập
                </button>
                
                <!-- Khi đã đăng nhập thành công, JS sẽ gỡ lớp 'hidden' để hiện cụm này -->
                <div id="user-logged-in" class="hidden flex items-center space-x-3">
                    <img id="user-avatar" src="" alt="Avatar" class="w-8 h-8 rounded-full border border-gray-600 bg-gray-700">
                    <span id="user-display-name" class="text-sm font-medium text-gray-300"></span>
                    <button id="btn-logout" class="text-xs text-gray-400 hover:text-red-400 transition" title="Đăng xuất">
                        <i class="fa-solid fa-right-from-bracket text-base"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- 2. BỐ CỤC CHÍNH (3 CỘT) -->
    <main class="max-w-[1400px] mx-auto px-6 py-6 grid grid-cols-12 gap-6">
        
        <!-- CỘT TRÁI: Menu điều hướng nhanh -->
        <aside class="col-span-3 space-y-2 sticky top-20 h-fit">
            <a href="#" class="flex items-center space-x-3 p-3 rounded-xl bg-[#16181f] text-white font-medium transition">
                <i class="fa-solid fa-bolt text-yellow-500 w-5 text-center"></i>
                <span>Mới nhất</span>
            </a>
            <a href="#" class="flex items-center space-x-3 p-3 rounded-xl hover:bg-[#16181f] text-gray-400 hover:text-white transition">
                <i class="fa-solid fa-users text-blue-500 w-5 text-center"></i>
                <span>Đang theo dõi</span>
            </a>
        </aside>

        <!-- CỘT GIỮA: Dòng thời gian / Danh sách bài viết Newsfeed -->
        <section class="col-span-6">
            <div id="newsfeed-container" class="space-y-6">
                <p class="text-center text-sm text-gray-500 py-4">Đang tải bản tin...</p>
            </div>
        </section>

        <!-- CỘT PHẢI: Hộp công cụ tạo bài viết -->
        <aside class="col-span-3 space-y-4 sticky top-20 h-fit">
            <div class="bg-[#16181f] rounded-2xl p-4 border border-gray-800/50 space-y-4 text-center">
                <div class="flex items-center space-x-3 justify-start text-left">
                    <img id="side-user-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=doraemon" alt="Avatar" class="w-10 h-10 rounded-full bg-gray-700">
                    <p id="side-user-name" class="text-sm font-medium text-gray-300">Khách ẩn danh</p>
                </div>
                <!-- Nút bấm mở pop-up Tạo bài viết -->
                <button id="btn-open-post-modal" class="w-full bg-[#248a3d] hover:bg-[#1e7232] text-white font-semibold py-2.5 px-4 rounded-xl flex items-center justify-center gap-2 transition text-sm shadow-md">
                    <i class="fa-solid fa-pen-nib"></i> Tạo bài viết
                </button>
            </div>
        </aside>

    </main>

    <!-- 3. POP-UP TẠO BÀI VIẾT (MẶC ĐỊNH ẨN) -->
    <div id="post-modal" class="hidden fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4">
        <div class="bg-[#16181f] border border-gray-800 w-full max-w-lg rounded-2xl p-5 space-y-4 relative animate-fade-in">
            <div class="flex items-center justify-between border-b border-gray-800 pb-3">
                <h3 class="text-lg font-bold">Tạo bài viết mới</h3>
                <button id="btn-close-post-modal" class="text-gray-400 hover:text-white text-xl">&times;</button>
            </div>
            <!-- Khung nhập text -->
            <textarea id="post-content" rows="4" placeholder="Bồ đang nghĩ gì thế..." class="w-full bg-[#20232b] rounded-xl p-3 text-sm text-white focus:outline-none focus:ring-1 focus:ring-gray-600 resize-none"></textarea>
            
            <!-- Khu vực chọn File đính kèm -->
            <div class="flex items-center justify-between bg-[#20232b] p-3 rounded-xl">
                <span class="text-xs text-gray-400">Thêm vào bài viết của bồ:</span>
                <label class="cursor-pointer text-green-500 hover:text-green-400 text-lg flex items-center gap-2">
                    <i class="fa-regular fa-images"></i>
                    <input type="file" id="post-file" accept="image/*,video/*" class="hidden">
                </label>
            </div>

            <!-- Nút đăng bài -->
            <button id="btn-submit-post" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl transition text-sm">
                Đăng bài lên Bản Tin
            </button>
        </div>
    </div>

    <!-- 4. POP-UP ĐĂNG NHẬP / ĐĂNG KÝ (MẶC ĐỊNH ẨN) -->
    <div id="auth-modal" class="hidden fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4">
        <div class="bg-[#16181f] border border-gray-800 w-full max-w-md rounded-2xl p-6 space-y-4 relative">
            <!-- Tiêu đề hộp thoại -->
            <div class="flex items-center justify-between border-b border-gray-800 pb-3">
                <h3 id="auth-modal-title" class="text-lg font-bold text-white">Đăng Nhập Toàn Cầu</h3>
                <button id="btn-close-auth-modal" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            
            <!-- Các ô điền thông tin -->
            <div class="space-y-3">
                <!-- Ô nhập Tên hiển thị (Mặc định ẩn, chỉ hiện khi đổi sang chế độ Đăng Ký) -->
                <div id="auth-username-group" class="hidden space-y-1">
                    <label class="text-xs text-gray-400">Tên của bồ:</label>
                    <input type="text" id="auth-username" placeholder="Ví dụ: Nobi Nobita" class="w-full bg-[#20232b] rounded-xl p-3 text-sm text-white focus:outline-none focus:ring-1 focus:ring-gray-600">
                </div>

                <div class="space-y-1">
                    <label class="text-xs text-gray-400">Email:</label>
                    <input type="email" id="auth-email" placeholder="doraemonfansub@gmail.com" class="w-full bg-[#20232b] rounded-xl p-3 text-sm text-white focus:outline-none focus:ring-1 focus:ring-gray-600">
                </div>
                
                <div class="space-y-1">
                    <label class="text-xs text-gray-400">Mật khẩu:</label>
                    <input type="password" id="auth-password" placeholder="••••••••" class="w-full bg-[#20232b] rounded-xl p-3 text-sm text-white focus:outline-none focus:ring-1 focus:ring-gray-600">
                </div>
            </div>

            <!-- Nút kích hoạt hành động -->
            <button id="btn-auth-submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl transition text-sm">
                Đăng Nhập
            </button>

            <!-- Dòng chữ đổi trạng thái qua lại giữa Đăng nhập / Đăng ký -->
            <p class="text-center text-xs text-gray-400 pt-2">
                <span id="auth-toggle-text">Chưa có tài khoản?</span> 
                <button id="btn-toggle-auth-mode" class="text-blue-500 hover:underline font-medium ml-1">Đăng ký ngay</button>
            </p>
        </div>
    </div>

    <!-- Nhúng file xử lý logic giao diện popup bằng JS thuần -->
    <script type="module">
        // Bật tắt Modal Tạo bài viết
        const postModal = document.getElementById('post-modal');
        document.getElementById('btn-open-post-modal').addEventListener('click', () => postModal.classList.remove('hidden'));
        document.getElementById('btn-close-post-modal').addEventListener('click', () => postModal.classList.add('hidden'));
    </script>

    <!-- Nhúng các file xử lý logic hệ thống chính thức -->
    <script type="module" src="./js/auth.js"></script>
    <script type="module" src="./js/newsfeed.js"></script>
</body>
</html>
