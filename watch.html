<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho phim - Doraemon Fansub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>body { background-color: #0d0e12; color: #ffffff; }</style>
</head>
<body>
    <header class="flex items-center justify-between px-6 py-3 bg-[#16181f] border-b border-gray-800">
        <h1 class="text-xl font-bold text-blue-500">doraemon<span class="text-white">fansub</span></h1>
    </header>

    <main class="max-w-[800px] mx-auto p-6" x-data="{ url: '' }">
        <h2 class="text-2xl font-bold mb-6">Danh sách phim</h2>
        
        <div class="space-y-3 mb-10">
            <button @click="url = 'https://abyssplayer.com/d9wfiN-31'" class="w-full text-left p-4 bg-[#16181f] hover:bg-gray-800 rounded-lg">
                ▶ Chú khủng long của Nobita
            </button>
            <button @click="url = 'https://abyssplayer.com/qZKGH3thJG'" class="w-full text-left p-4 bg-[#16181f] hover:bg-gray-800 rounded-lg">
                ▶ Stand by Me Doraemon 2
            </button>
        </div>

        <div x-show="url !== ''" class="bg-[#16181f] p-5 rounded-2xl border border-gray-800">
            <div class="relative w-full pt-[56.25%] bg-black rounded-lg overflow-hidden">
                <iframe class="absolute top-0 left-0 w-full h-full" x-bind:src="url" frameborder="0" allowfullscreen></iframe>
            </div>
            <button @click="url = ''" class="mt-4 text-sm text-gray-400 hover:text-white">Đóng video</button>
        </div>
    </main>
</body>
</html>
