<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Doraemon Fansub Việt Nam</title>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithPopup, 
            GoogleAuthProvider, 
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            sendPasswordResetEmail,
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBt3G9n5JYu3EsvqJR9IoW2vRAc_Es3-ws",
            authDomain: "doraemon-fansub-vietnam.firebaseapp.com",
            projectId: "doraemon-fansub-vietnam",
            storageBucket: "doraemon-fansub-vietnam.firebasestorage.app",
            messagingSenderId: "380840935390",
            appId: "1:380840935390:web:60fab4722a9fba5053a74f",
            measurementId: "G-0S2Z4XRK0B"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const analytics = getAnalytics(app);
        const provider = new GoogleAuthProvider();

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const forgotForm = document.getElementById('forgotForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const registerEmail = document.getElementById('registerEmail');
        const registerPassword = document.getElementById('registerPassword');
        const registerConfirmPassword = document.getElementById('registerConfirmPassword');
        const forgotEmail = document.getElementById('forgotEmail');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loginBtn = document.getElementById('loginBtn');
        const googleBtn = document.getElementById('googleBtn');
        const registerBtn = document.getElementById('registerBtn');
        const forgotBtn = document.getElementById('forgotBtn');
        const showRegister = document.getElementById('showRegister');
        const showLogin = document.getElementById('showLogin');
        const showForgot = document.getElementById('showForgot');
        const backToLogin = document.getElementById('backToLogin');
        const backToLogin2 = document.getElementById('backToLogin2');

        // ===== TOGGLE FORMS =====
        function showForm(formToShow) {
            loginForm.style.display = 'none';
            registerForm.style.display = 'none';
            forgotForm.style.display = 'none';
            formToShow.style.display = 'block';
            clearMessages();
        }

        showRegister.addEventListener('click', (e) => {
            e.preventDefault();
            showForm(registerForm);
        });

        showLogin.addEventListener('click', (e) => {
            e.preventDefault();
            showForm(loginForm);
        });

        showForgot.addEventListener('click', (e) => {
            e.preventDefault();
            showForm(forgotForm);
        });

        backToLogin.addEventListener('click', (e) => {
            e.preventDefault();
            showForm(loginForm);
        });

        backToLogin2.addEventListener('click', (e) => {
            e.preventDefault();
            showForm(loginForm);
        });

        // ===== MESSAGES =====
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 5000);
        }

        function clearMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        function showLoading() {
            loadingOverlay.style.display = 'flex';
        }

        function hideLoading() {
            loadingOverlay.style.display = 'none';
        }

        // ===== LOGIN =====
        loginBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!email || !password) {
                showError('Vui lòng nhập đầy đủ email và mật khẩu!');
                return;
            }

            showLoading();
            try {
                await signInWithEmailAndPassword(auth, email, password);
                showSuccess('Đăng nhập thành công! Đang chuyển hướng...');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } catch (error) {
                let message = 'Đăng nhập thất bại! ';
                switch (error.code) {
                    case 'auth/user-not-found':
                        message += 'Email chưa được đăng ký.';
                        break;
                    case 'auth/wrong-password':
                        message += 'Mật khẩu không đúng.';
                        break;
                    case 'auth/invalid-email':
                        message += 'Email không hợp lệ.';
                        break;
                    case 'auth/too-many-requests':
                        message += 'Quá nhiều yêu cầu, vui lòng thử lại sau.';
                        break;
                    default:
                        message += error.message;
                }
                showError(message);
            }
            hideLoading();
        });

        // ===== GOOGLE LOGIN =====
        googleBtn.addEventListener('click', async () => {
            showLoading();
            try {
                await signInWithPopup(auth, provider);
                showSuccess('Đăng nhập thành công! Đang chuyển hướng...');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } catch (error) {
                let message = 'Đăng nhập Google thất bại! ';
                if (error.code === 'auth/popup-closed-by-user') {
                    message += 'Bạn đã đóng cửa sổ đăng nhập.';
                } else if (error.code === 'auth/unauthorized-domain') {
                    message += 'Domain chưa được ủy quyền.';
                } else {
                    message += error.message;
                }
                showError(message);
            }
            hideLoading();
        });

        // ===== REGISTER =====
        registerBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            const email = registerEmail.value.trim();
            const password = registerPassword.value.trim();
            const confirmPassword = registerConfirmPassword.value.trim();

            if (!email || !password || !confirmPassword) {
                showError('Vui lòng nhập đầy đủ thông tin!');
                return;
            }

            if (password.length < 6) {
                showError('Mật khẩu phải có ít nhất 6 ký tự!');
                return;
            }

            if (password !== confirmPassword) {
                showError('Mật khẩu xác nhận không khớp!');
                return;
            }

            showLoading();
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                showSuccess('Đăng ký thành công! Đang chuyển hướng...');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } catch (error) {
                let message = 'Đăng ký thất bại! ';
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        message += 'Email đã được sử dụng.';
                        break;
                    case 'auth/invalid-email':
                        message += 'Email không hợp lệ.';
                        break;
                    case 'auth/weak-password':
                        message += 'Mật khẩu quá yếu.';
                        break;
                    default:
                        message += error.message;
                }
                showError(message);
            }
            hideLoading();
        });

        // ===== FORGOT PASSWORD =====
        forgotBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            const email = forgotEmail.value.trim();

            if (!email) {
                showError('Vui lòng nhập email của bạn!');
                return;
            }

            showLoading();
            try {
                await sendPasswordResetEmail(auth, email);
                showSuccess('Email đặt lại mật khẩu đã được gửi!');
                forgotEmail.value = '';
                setTimeout(() => {
                    showForm(loginForm);
                }, 3000);
            } catch (error) {
                let message = 'Gửi email thất bại! ';
                if (error.code === 'auth/user-not-found') {
                    message += 'Email chưa được đăng ký.';
                } else {
                    message += error.message;
                }
                showError(message);
            }
            hideLoading();
        });

        // ===== ENTER KEY =====
        emailInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                passwordInput.focus();
            }
        });

        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                loginBtn.click();
            }
        });

        // ===== CHECK AUTH =====
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 24px;
            padding: 40px 35px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Loading */
        .loading-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            z-index: 10;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 16px;
        }

        .loading-overlay .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f0f2f5;
            border-top: 4px solid #1a73e8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-overlay p {
            color: #1a1a2e;
            font-weight: 600;
            font-size: 15px;
        }

        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #ffeb3b;
            padding: 8px;
            margin-bottom: 10px;
        }

        .logo h1 {
            font-size: 24px;
            color: #1a1a2e;
        }

        .logo h1 span {
            color: #1a73e8;
        }

        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 4px;
        }

        /* Messages */
        .message {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 16px;
            display: none;
        }

        .message.error {
            background: #fce8e6;
            color: #e94560;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        /* Forms */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e4e6eb;
            border-radius: 12px;
            font-size: 15px;
            transition: 0.3s;
            outline: none;
            background: #fafafa;
        }

        .form-group input:focus {
            border-color: #1a73e8;
            background: white;
            box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #1557b0;
            transform: scale(1.02);
        }

        .btn-google {
            width: 100%;
            padding: 14px;
            background: white;
            color: #1a1a2e;
            border: 2px solid #e4e6eb;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-google:hover {
            background: #f0f2f5;
            border-color: #1a73e8;
            transform: scale(1.02);
        }

        .btn-google img {
            width: 24px;
            height: 24px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            color: #999;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e4e6eb;
        }

        .form-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #666;
        }

        .form-footer a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .form-links {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 14px;
        }

        .form-links a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
        }

        .form-links a:hover {
            text-decoration: underline;
        }

        #registerForm,
        #forgotForm {
            display: none;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 20px;
            }

            .logo img {
                width: 50px;
                height: 50px;
            }

            .form-links {
                flex-direction: column;
                gap: 8px;
                align-items: center;
            }
        }
    </style>
</head>
<body>

<div class="login-container">

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>⏳ Đang xử lý...</p>
    </div>

    <div class="logo">
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23ffeb3b'/%3E%3Ccircle cx='35' cy='40' r='8' fill='%231a1a2e'/%3E%3Ccircle cx='65' cy='40' r='8' fill='%231a1a2e'/%3E%3Cellipse cx='50' cy='60' rx='18' ry='12' fill='%231a1a2e'/%3E%3Ccircle cx='50' cy='55' r='6' fill='%23e94560'/%3E%3C/svg%3E" alt="Doraemon">
        <h1>Doraemon <span>Fansub VN</span></h1>
        <p>Đăng nhập để tham gia cộng đồng</p>
    </div>

    <div class="message error" id="errorMessage"></div>
    <div class="message success" id="successMessage"></div>

    <!-- LOGIN -->
    <form id="loginForm">
        <div class="form-group">
            <label>📧 Email</label>
            <input type="email" id="email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
            <label>🔒 Mật khẩu</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">Đăng nhập</button>
        <div class="form-links">
            <a href="#" id="showForgot">Quên mật khẩu?</a>
            <a href="#" id="showRegister">Chưa có tài khoản? Đăng ký</a>
        </div>
    </form>

    <!-- REGISTER -->
    <form id="registerForm">
        <div class="form-group">
            <label>📧 Email</label>
            <input type="email" id="registerEmail" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
            <label>🔒 Mật khẩu</label>
            <input type="password" id="registerPassword" placeholder="Tối thiểu 6 ký tự" required>
        </div>
        <div class="form-group">
            <label>✅ Xác nhận mật khẩu</label>
            <input type="password" id="registerConfirmPassword" placeholder="Nhập lại mật khẩu" required>
        </div>
        <button type="submit" class="btn-primary" id="registerBtn">Đăng ký</button>
        <div class="form-footer">
            Đã có tài khoản? <a href="#" id="backToLogin">Đăng nhập</a>
        </div>
    </form>

    <!-- FORGOT -->
    <form id="forgotForm">
        <div class="form-group">
            <label>📧 Email</label>
            <input type="email" id="forgotEmail" placeholder="example@email.com" required>
        </div>
        <button type="submit" class="btn-primary" id="forgotBtn">Gửi email đặt lại</button>
        <div class="form-footer">
            <a href="#" id="backToLogin2">← Quay lại đăng nhập</a>
        </div>
    </form>

    <div class="divider">Hoặc</div>

    <button class="btn-google" id="googleBtn">
        <svg width="24" height="24" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
            <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
            <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
            <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
        </svg>
        Đăng nhập với Google
    </button>

    <div style="text-align:center;margin-top:16px;font-size:12px;color:#999;">
        🔒 Bảo mật bởi Firebase
    </div>
</div>

</body>
</html>
