<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Doraemon Fansub VN</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 24px;
            padding: 40px 35px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .loading-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            z-index: 10;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 16px;
        }

        .loading-overlay .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f0f2f5;
            border-top: 4px solid #1a73e8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .loading-overlay p {
            color: #1a1a2e;
            font-weight: 600;
            font-size: 15px;
        }

        .logo-wrapper {
            text-decoration: none;
            display: block;
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
            cursor: pointer;
        }

        .logo img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 3px solid #ffeb3b;
        }

        .logo h1 {
            font-size: 24px;
            color: #1a1a2e;
        }

        .logo h1 span {
            color: #1a73e8;
        }

        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 4px;
        }

        .domain-info {
            background: #e8f0fe;
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #1a73e8;
            text-align: center;
            border: 1px solid #d2e3fc;
        }

        .domain-info strong {
            background: #1a73e8;
            color: white;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 6px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 16px;
            display: none;
            white-space: pre-line;
            line-height: 1.6;
        }

        .message.error {
            background: #fce8e6;
            color: #c62828;
            border: 1px solid #f5c6cb;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e4e6eb;
            border-radius: 12px;
            font-size: 15px;
            transition: 0.3s;
            outline: none;
            background: #fafafa;
        }

        .form-group input:focus {
            border-color: #1a73e8;
            background: white;
            box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #1557b0;
            transform: scale(1.02);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-google {
            width: 100%;
            padding: 14px;
            background: white;
            color: #1a1a2e;
            border: 2px solid #e4e6eb;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-google:hover {
            background: #f0f2f5;
            border-color: #1a73e8;
            transform: scale(1.02);
        }

        .btn-google:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            color: #999;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e4e6eb;
        }

        .form-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #666;
        }

        .form-footer a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .form-links {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 14px;
        }

        .form-links a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
        }

        .form-links a:hover {
            text-decoration: underline;
        }

        #registerForm,
        #forgotForm {
            display: none;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            .logo h1 {
                font-size: 20px;
            }
            .logo img {
                width: 60px;
                height: 60px;
            }
            .form-links {
                flex-direction: column;
                gap: 8px;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- Loading -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p>⏳ Đang xử lý...</p>
        </div>

        <!-- Logo -->
        <a href="index.html" class="logo-wrapper">
            <div class="logo">
                <img src="https://i.ibb.co/9kJhtfp1/Doraemon-fansub.png" alt="Doraemon Fansub" />
                <h1>Doraemon <span>FanSub</span></h1>
                <p>Đăng nhập để tham gia cộng đồng</p>
            </div>
        </a>

        <div class="domain-info">
            🌐 Domain hiện tại: <strong id="domainInfo">loading...</strong>
        </div>

        <div class="message error" id="errorMessage"></div>
        <div class="message success" id="successMessage"></div>

        <!-- LOGIN -->
        <form id="loginForm" onsubmit="return false;">
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="email" placeholder="example@email.com" required />
            </div>
            <div class="form-group">
                <label>🔒 Mật khẩu</label>
                <input type="password" id="password" placeholder="••••••••" required />
            </div>
            <button type="button" class="btn-primary" id="loginBtn">Đăng nhập</button>
            <div class="form-links">
                <a href="#" id="showForgot">Quên mật khẩu?</a>
                <a href="#" id="showRegister">Đăng ký</a>
            </div>
        </form>

        <!-- REGISTER -->
        <form id="registerForm" onsubmit="return false;">
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="registerEmail" placeholder="example@email.com" required />
            </div>
            <div class="form-group">
                <label>🔒 Mật khẩu</label>
                <input type="password" id="registerPassword" placeholder="Tối thiểu 6 ký tự" required />
            </div>
            <div class="form-group">
                <label>✅ Xác nhận mật khẩu</label>
                <input type="password" id="registerConfirmPassword" placeholder="Nhập lại mật khẩu" required />
            </div>
            <button type="button" class="btn-primary" id="registerBtn">Đăng ký</button>
            <div class="form-footer">
                Đã có tài khoản? <a href="#" id="backToLogin">Đăng nhập</a>
            </div>
        </form>

        <!-- FORGOT -->
        <form id="forgotForm" onsubmit="return false;">
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="forgotEmail" placeholder="example@email.com" required />
            </div>
            <button type="button" class="btn-primary" id="forgotBtn">Gửi email đặt lại</button>
            <div class="form-footer">
                <a href="#" id="backToLogin2">← Quay lại đăng nhập</a>
            </div>
        </form>

        <div class="divider">Hoặc</div>

        <button class="btn-google" id="googleBtn">
            <svg width="24" height="24" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
            </svg>
            Đăng nhập với Google
        </button>

        <div style="text-align:center;margin-top:16px;font-size:12px;color:#999;">
            🔒 Bảo mật bởi Firebase
        </div>
    </div>

    <script>
        document.getElementById('domainInfo').textContent = window.location.hostname;

        const firebaseConfig = {
            apiKey: "AIzaSyBt3G9n5JYu3EsvqJR9IoW2vRAc_Es3-ws",
            authDomain: "doraemon-fansub-vietnam.firebaseapp.com",
            projectId: "doraemon-fansub-vietnam",
            storageBucket: "doraemon-fansub-vietnam.firebasestorage.app",
            messagingSenderId: "380840935390",
            appId: "1:380840935390:web:60fab4722a9fba5053a74f",
            measurementId: "G-0S2Z4XRK0B"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        const loading = document.getElementById('loadingOverlay');
        const errorMsg = document.getElementById('errorMessage');
        const successMsg = document.getElementById('successMessage');

        // ============================================================
        // HÀM LƯU USER VÀO FIRESTORE (SỬA LỖI)
        // ============================================================
        function saveUserToFirestore(user, isNew = false) {
            const userData = {
                email: user.email,
                displayName: user.displayName || user.email.split('@')[0],
                photoURL: user.photoURL || '',
                providerData: user.providerData || [],
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (isNew) {
                userData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            }

            // Lưu vào Firestore với merge: true để không ghi đè
            return db.collection('users').doc(user.uid).set(userData, { merge: true })
                .then(() => {
                    console.log('✅ Đã lưu user vào Firestore:', user.email);
                    return true;
                })
                .catch((error) => {
                    console.error('❌ Lỗi lưu user:', error);
                    return false;
                });
        }

        // ============================================================
        // TOAST
        // ============================================================
        function showLoading() { loading.style.display = 'flex'; }

        function hideLoading() { loading.style.display = 'none'; }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
            setTimeout(() => errorMsg.style.display = 'none', 8000);
        }

        function showSuccess(msg) {
            successMsg.textContent = msg;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
            setTimeout(() => successMsg.style.display = 'none', 5000);
        }

        function clearMessages() {
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
        }

        // ============================================================
        // LOGIN
        // ============================================================
        document.getElementById('loginBtn').addEventListener('click', function() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!email || !password) {
                showError('📝 Vui lòng nhập đầy đủ email và mật khẩu!');
                return;
            }
            showLoading();
            this.disabled = true;
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Lưu user vào Firestore
                    return saveUserToFirestore(userCredential.user, false);
                })
                .then(() => {
                    showSuccess('✅ Đăng nhập thành công! Đang chuyển hướng...');
                    setTimeout(() => window.location.href = 'index.html', 1500);
                })
                .catch((err) => {
                    let msg = '❌ Đăng nhập thất bại! ';
                    switch (err.code) {
                        case 'auth/user-not-found':
                            msg += 'Email chưa được đăng ký.';
                            break;
                        case 'auth/wrong-password':
                            msg += 'Mật khẩu không đúng.';
                            break;
                        case 'auth/invalid-email':
                            msg += 'Email không hợp lệ.';
                            break;
                        case 'auth/too-many-requests':
                            msg += 'Quá nhiều yêu cầu, thử lại sau.';
                            break;
                        default:
                            msg += err.message;
                    }
                    showError(msg);
                })
                .finally(() => { this.disabled = false;
                    hideLoading(); });
        });

        // ============================================================
        // GOOGLE LOGIN
        // ============================================================
        document.getElementById('googleBtn').addEventListener('click', function() {
            showLoading();
            this.disabled = true;
            auth.signInWithPopup(provider)
                .then((result) => {
                    // Lưu user vào Firestore
                    return saveUserToFirestore(result.user, true);
                })
                .then(() => {
                    showSuccess('✅ Đăng nhập thành công! Đang chuyển hướng...');
                    setTimeout(() => window.location.href = 'index.html', 1500);
                })
                .catch((err) => {
                    let msg = '❌ Đăng nhập Google thất bại! ';
                    switch (err.code) {
                        case 'auth/popup-closed-by-user':
                            msg += 'Bạn đã đóng cửa sổ đăng nhập.';
                            break;
                        case 'auth/popup-blocked':
                            msg += 'Trình duyệt chặn popup, vui lòng cho phép.';
                            break;
                        case 'auth/unauthorized-domain':
                            msg += 'Domain chưa được ủy quyền. Vui lòng liên hệ quản trị viên.';
                            break;
                        default:
                            msg += err.message;
                    }
                    showError(msg);
                })
                .finally(() => { this.disabled = false;
                    hideLoading(); });
        });

        // ============================================================
        // REGISTER (SỬA LỖI - LƯU USER VÀO FIRESTORE)
        // ============================================================
        document.getElementById('registerBtn').addEventListener('click', function() {
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            const confirm = document.getElementById('registerConfirmPassword').value.trim();

            // Kiểm tra thông tin
            if (!email || !password || !confirm) {
                showError('📝 Vui lòng nhập đầy đủ thông tin!');
                return;
            }
            if (password.length < 6) {
                showError('🔒 Mật khẩu phải có ít nhất 6 ký tự!');
                return;
            }
            if (password !== confirm) {
                showError('❌ Mật khẩu xác nhận không khớp!');
                return;
            }

            showLoading();
            this.disabled = true;

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Lưu user mới vào Firestore
                    return saveUserToFirestore(userCredential.user, true);
                })
                .then((saved) => {
                    if (saved) {
                        showSuccess('✅ Đăng ký thành công! Đang chuyển hướng...');
                        setTimeout(() => window.location.href = 'index.html', 1500);
                    } else {
                        showError('❌ Đăng ký thành công nhưng không lưu được dữ liệu!');
                        setTimeout(() => window.location.href = 'index.html', 1500);
                    }
                })
                .catch((err) => {
                    let msg = '❌ Đăng ký thất bại! ';
                    switch (err.code) {
                        case 'auth/email-already-in-use':
                            msg += 'Email đã được sử dụng.';
                            break;
                        case 'auth/invalid-email':
                            msg += 'Email không hợp lệ.';
                            break;
                        case 'auth/weak-password':
                            msg += 'Mật khẩu quá yếu.';
                            break;
                        default:
                            msg += err.message;
                    }
                    showError(msg);
                })
                .finally(() => {
                    this.disabled = false;
                    hideLoading();
                });
        });

        // ============================================================
        // FORGOT PASSWORD
        // ============================================================
        document.getElementById('forgotBtn').addEventListener('click', function() {
            const email = document.getElementById('forgotEmail').value.trim();
            if (!email) {
                showError('📝 Vui lòng nhập email của bạn!');
                return;
            }
            if (!email.includes('@') || !email.includes('.')) {
                showError('📧 Email không hợp lệ! Vui lòng kiểm tra lại.');
                return;
            }
            showLoading();
            this.disabled = true;
            auth.sendPasswordResetEmail(email, {
                    url: window.location.href,
                    handleCodeInApp: false
                })
                .then(() => {
                    showSuccess(`✅ Email đặt lại mật khẩu đã được gửi đến ${email}!\n\nVui lòng kiểm tra hộp thư (cả Spam).`);
                    document.getElementById('forgotEmail').value = '';
                    setTimeout(() => {
                        document.getElementById('forgotForm').style.display = 'none';
                        document.getElementById('loginForm').style.display = 'block';
                        clearMessages();
                    }, 5000);
                })
                .catch((err) => {
                    console.error('Lỗi gửi email:', err);
                    let msg = '❌ Gửi email thất bại! ';
                    switch (err.code) {
                        case 'auth/user-not-found':
                            msg += 'Email này chưa được đăng ký. Vui lòng đăng ký tài khoản.';
                            break;
                        case 'auth/invalid-email':
                            msg += 'Email không hợp lệ. Vui lòng kiểm tra lại.';
                            break;
                        case 'auth/too-many-requests':
                            msg += 'Quá nhiều yêu cầu, vui lòng thử lại sau ít phút.';
                            break;
                        case 'auth/email-not-enabled':
                            msg += 'Email/Password chưa được bật trong Firebase Console.\n\n🔧 Hướng dẫn:\n1. Vào Firebase Console → Authentication\n2. Sign-in methods → Email/Password → Enable\n3. Lưu và thử lại.';
                            break;
                        default:
                            msg += err.message;
                    }
                    showError(msg);
                })
                .finally(() => {
                    this.disabled = false;
                    hideLoading();
                });
        });

        // ============================================================
        // TOGGLE FORMS
        // ============================================================
        document.getElementById('showRegister').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('forgotForm').style.display = 'none';
            clearMessages();
        });
        document.getElementById('showForgot').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('forgotForm').style.display = 'block';
            clearMessages();
        });
        document.getElementById('backToLogin').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('forgotForm').style.display = 'none';
            clearMessages();
        });
        document.getElementById('backToLogin2').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('forgotForm').style.display = 'none';
            clearMessages();
        });

        // ============================================================
        // ENTER KEY
        // ============================================================
        document.getElementById('email').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault();
                document.getElementById('password').focus(); }
        });
        document.getElementById('password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault();
                document.getElementById('loginBtn').click(); }
        });
        document.getElementById('registerEmail').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault();
                document.getElementById('registerPassword').focus(); }
        });
        document.getElementById('registerPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault();
                document.getElementById('registerConfirmPassword').focus(); }
        });
        document.getElementById('registerConfirmPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault();
                document.getElementById('registerBtn').click(); }
        });
        document.getElementById('forgotEmail').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault();
                document.getElementById('forgotBtn').click(); }
        });

        // ============================================================
        // AUTH STATE - Kiểm tra đã đăng nhập chưa
        // ============================================================
        auth.onAuthStateChanged(function(user) {
            if (user && window.location.pathname.includes('login.html')) {
                // Nếu đã đăng nhập và đang ở trang login, chuyển về index
                window.location.href = 'index.html';
            }
        });

        console.log('🔥 Firebase Auth sẵn sàng!');
        console.log('🌐 Domain:', window.location.hostname);
        console.log('👤 User sẽ được lưu vào Firestore khi đăng nhập/đăng ký!');
        console.log('✅ Đã sửa lỗi lưu user khi đăng ký!');
    </script>
</body>
</html>
